<style>
  :root {
    --bg: #fbfaf7; --fg: #1c1c1c; --muted: #6a655c; --accent: #7a1e1e; --rule: #d9d5cb;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;

  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14140f; --fg: #ececea; --muted: #8f8b83; --accent: #e0a3a3; --rule: #2e2d28; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: var(--serif); line-height: 1.6;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1.25rem; text-align: center;
  }
  .box { max-width: 32rem; }
  .code {
    font-family: var(--sans); font-size: 5.5rem; font-weight: 700;
    letter-spacing: -.05em; color: var(--accent); line-height: 1;
    margin: 0 0 1rem;
  }
  h1 { font-size: 1.6rem; margin: 0 0 .8rem; letter-spacing: -.01em; }
  p { color: var(--muted); margin: 0 0 1.8rem; font-size: 1.05rem; }
  .cta { display: flex; flex-wrap: wrap; gap: .6rem; justify-content: center; }
  .btn {
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    padding: .55rem 1rem; border-radius: 6px; text-decoration: none;
    border: 1px solid var(--rule); color: var(--fg); background: transparent;
    transition: all .15s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { background: color-mix(in srgb, var(--accent) 82%, transparent); }
  .lang { margin-top: 2rem; font-family: var(--sans); font-size: .82rem; color: var(--muted); }
  .lang a { color: var(--muted); text-decoration: underline; }
  .lang a:hover { color: var(--accent); }
